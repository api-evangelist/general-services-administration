aid: general-services-administration
name: General Services Administration
description: >-
  The General Services Administration (GSA) provides workplaces by
  constructing, managing, and preserving government buildings and by leasing
  and managing commercial real estate. GSA acquisition solutions offer private
  sector professional services, equipment, supplies, and IT to government
  organizations and the military. GSA also promotes management best practices
  and efficient government operations through the development of governmentwide
  policies, including a broad portfolio of public APIs.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
created: '2024-12-03'
modified: '2026-04-28'
position: Consumer
